<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link css -->
    <link rel="stylesheet" href="style.css">
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
</head>

<body class="flex justify-center items-center h-screen bg-[#F8FAFC]">
    <section>
        <fieldset class="fieldset bg-white shadow-lg border-base-300 rounded-box w-xs border p-4">
            <!-- <legend class="fieldset-legend">Login</legend> -->
            <div class="brand flex justify-center pt-8 pb-6">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="text-center font-semibold text-[#1F2937] text-2xl mb-1">GitHub Issues Tracker</h1>

            <p class="text-[#64748B] text-center mb-6">Sign in to manage your issues</p>

            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="user-name" type="email" class="input outline-none" placeholder="Username" />

            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="pin-number" type="password" class="input outline-none" placeholder="Password" />

            <button id="sing-in-btn" class="btn bg-[#4A00FF] text-white mb-6 mt-4">Sign In</button>

            <div class="flex items-center gap-3">
                <hr class="flex-1 border-gray-300">
                <p class="text-center">or</p>
                <hr class="flex-1 border-gray-300">
            </div>

            <p class="text-[#64748B] text-center mb-2">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] rounded-md flex justify-center items-center py-6">
                <p><span class="text-[#1F2937] font-semibold">Username:</span> admin <br>
                    <span class="text-[#1F2937] font-semibold">Password: </span>admin123
                </p>
            </div>
        </fieldset>
    </section>
    <script src="./script/login.js"></script>
</body>

</html>
