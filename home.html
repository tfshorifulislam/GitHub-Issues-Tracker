<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link css -->
    <link rel="stylesheet" href="style.css">
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
</head>

<body class="max-w-[1920px] w-11/12 mx-auto bg-[#F8FAFC] h-screen">
    <!-- header section -->
    <header class="mb-14">
        <div class="navbar bg-base-100 shadow-sm text-center space-y-3 flex flex-col lg:flex-row md:justify-between">

            <div class="flex justify-center items-center gap-4 cursor-pointer">
                <a><img class="w-9 h-9" src="./assets/github-logo.png" alt=""></a>

                <p class="font-semibold text-2xl text-[#1F2937]">
                    GitHub Issues Tracker
                </p>
            </div>


            <div class="flex gap-4">
                <label class="input outline-none">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>
                <button id="search-btn" class="btn bg-[#4A00FF] text-white rounded-md"><i class="fa-solid fa-plus"></i> New
                    Issue</button>
            </div>

        </div>
    </header>

    <main class="">
        <!-- btn switch -->
        <section id="switch-btn-parent" class="p-6 bg-white rounded-lg flex flex-col md:flex-row gap-2 mb-4 shadow-md">
            <button id="all-btn" class="btn btn-soft border-none bg-[#4A00FF] text-white px-10">All</button>
            <button id="open-btn"
                class="btn btn-soft bg-white text-[#64748B] border border-[#E4E4E7] px-10">Open</button>
            <button id="close-btn"
                class="btn btn-soft bg-white text-[#64748B] border border-[#E4E4E7] px-10">Closed</button>
        </section>

        <!-- issues show section -->
        <section class="p-6 bg-white rounded-lg flex flex-col md:flex-row md:justify-between space-y-5 shadow-sm">
            <div class="flex items-center gap-2">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold text-[#1F2937] text-xl"><span id="available-issues">0</span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-5">
                <p class="flex items-center gap-2"><img src="./assets/Ellipse 2.png" alt=""> Open</p>
                <p class="flex items-center gap-2"><img src="./assets/Ellipse 2-1.png" alt=""> Closed</p>
            </div>
        </section>

        <!-- spinner section -->
        <div id="spinner-loading" class="flex justify-center py-5 items-center">
            <span class="loading loading-spinner loading-xl"></span>
        </div>
        <!-- content section -->
        <section class="bg-[#FBFBFB]  shadow-md p-6">
            <div id="content-display" class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 space-x-6 space-y-6">

            </div>
        </section>

        <!-- modal section -->
        <section>
    
            <dialog id="my_modal_1" class="modal">
                <div class="modal-box">
                    <div id="modal-show-section"></div>
                    
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn font-semibold text-white bg-[#4A00FF]">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>

        </section>
    </main>
    <script src="./script/config.js"></script>
</body>

</html>
